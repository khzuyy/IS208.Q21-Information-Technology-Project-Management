<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
  <link rel="stylesheet" href="css/font.css" />
<link rel="stylesheet" href="css/loginpopup.css" />
</head>
  <body>
    <div class="container">
      <div class="login-box">
        <h2>Đăng ký</h2>

        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" id="username">
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password">
        </div>

        <div class="form-group">
          <label>Vai trò:</label>
        </div>
        <div>
          <label><input type="radio" name="role" value="Khách hàng"> Khách hàng</label>
          <label><input type="radio" name="role" value="Nhà tổ chức"> Nhà tổ chức sự kiện</label>
          <label><input type="radio" name="role" value="Nhân viên"> Nhân viên</label>
        </div>

        <div class="actions">
          <button class="btn-login"  onclick="acceptRegister()">Xác nhận</button>
          <button class="btn-cancel" onclick="cancelRF()">Hủy</button>
        </div>
      </div>
    </div>

    <!-- Model: api.js | Controller: register.js | View helpers: ui.js -->
    <script src="js/common/api.js"></script>
    <script src="js/auth/register.js"></script>
    <script src="js/common/ui.js"></script>
  </body>
</html>
