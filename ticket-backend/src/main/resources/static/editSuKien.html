<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chỉnh sửa sự kiện</title>
  <link rel="stylesheet" href="css/font.css" />
  <link rel="stylesheet" href="css/editSuKien.css">
</head>
<body>
  <div class="container">
    <h1>Chỉnh sửa sự kiện</h1>

    <div class="form-group">
      <label>Tên sự kiện</label>
      <input type="text" id="tenSuKien">
    </div>

    <div class="form-group">
      <label>Mô tả</label>
      <textarea id="moTa"></textarea>
    </div>

    <div class="form-group">
      <label>Địa điểm</label>
      <select id="diaDiem">
        <option value="">-- Đang tải địa điểm... --</option>
      </select>
    </div>

    <div class="form-group">
      <label>Thời gian bắt đầu</label>
      <input type="date" id="thoiGianBatDau">
    </div>

    <div class="form-group">
      <label>Thời gian kết thúc</label>
      <input type="date" id="thoiGianKetThuc">
    </div>

    <div id="msgBox"></div>

    <div class="button-group">
      <button class="create-btn" onclick="updateEvent()">Cập nhật</button>
      <button class="cancel-btn" onclick="goBack()">Hủy</button>
    </div>
  </div>

  <script src="js/common/api.js"></script>
  <script src="js/common/authGuard.js"></script>
  <script src="js/event/editEvent.js"></script>
</body>
</html>
