<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ tài khoản</title>
  <link rel="stylesheet" href="css/font.css" />
  <link rel="stylesheet" href="css/loginpopup.css">
  <link rel="stylesheet" href="css/hoSo.css">
</head>
<body>
  <div class="card">
    <h2>👤 Hồ sơ tài khoản</h2>
    <p class="subtitle" id="loaiTK"></p>

    <!-- Thông tin đăng nhập (readonly) -->
    <div class="section-title">Thông tin đăng nhập</div>
    <div class="form-group">
      <label>Tên tài khoản</label>
      <input type="text" id="tenDangNhap" readonly>
    </div>

    <hr class="divider">

    <!-- Thông tin cá nhân — KhachHang -->
    <div id="section-customer" class="hidden">
      <div class="section-title">Thông tin cá nhân</div>
      <div class="form-group">
        <label>Họ và tên <span class="required">*</span></label>
        <input type="text" id="tenKhachHang" placeholder="Nhập họ và tên">
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="email-customer" placeholder="Nhập email">
      </div>
      <div class="form-group">
        <label>Số điện thoại <span class="required">*</span></label>
        <input type="tel" id="sdt-customer" placeholder="Nhập số điện thoại">
      </div>
    </div>

    <!-- Thông tin công ty — NhaToChuc -->
    <div id="section-creator" class="hidden">
      <div class="section-title">Thông tin nhà tổ chức</div>
      <div class="form-group">
        <label>Tên công ty <span class="required">*</span></label>
        <input type="text" id="tenCongTy" placeholder="Nhập tên công ty">
      </div>
      <div class="form-group">
        <label>Người đại diện <span class="required">*</span></label>
        <input type="text" id="tenNguoiDaiDien" placeholder="Nhập tên người đại diện">
      </div>
      <div class="form-group">
        <label>Địa chỉ</label>
        <input type="text" id="diaChi" placeholder="Nhập địa chỉ">
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="email-creator" placeholder="Nhập email">
      </div>
      <div class="form-group">
        <label>Số điện thoại <span class="required">*</span></label>
        <input type="tel" id="sdt-creator" placeholder="Nhập số điện thoại">
      </div>
      <div class="form-group">
        <label>Ảnh QR thanh toán <span class="required">*</span></label>
        <input type="file" id="qr-file" accept="image/*" onchange="previewQR(this)">
        <img id="qr-preview" style="display:none; max-width:200px; margin-top:8px;">
        <small class="field-note">Bắt buộc — dùng để nhận thanh toán từ khách hàng</small>
      </div>
    </div>

    <!-- Thông tin cá nhân — NhanVien -->
    <div id="section-employee" class="hidden">
      <div class="section-title">Thông tin nhân viên</div>
      <div class="form-group">
        <label>Tên nhân viên <span class="required">*</span></label>
        <input type="text" id="tenNhanVien" placeholder="Nhập tên nhân viên">
      </div>
      <div class="form-group">
        <label>Ngày vào làm</label>
        <input type="date" id="ngayVaoLam">
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="email-employee" placeholder="Nhập email">
      </div>
      <div class="form-group">
        <label>Số điện thoại <span class="required">*</span></label>
        <input type="tel" id="sdt-employee" placeholder="Nhập số điện thoại">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="luuHoSo()">Lưu thay đổi</button>
      <button class="btn btn-secondary" onclick="goBack()">Quay lại</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script src="js/common/api.js"></script>
  <script src="js/common/authGuard.js"></script>
  <script src="js/auth/hoSo.js"></script>
</body>
</html>
