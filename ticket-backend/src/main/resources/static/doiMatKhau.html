<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Đổi mật khẩu</title>
  <link rel="stylesheet" href="css/font.css" />
<link rel="stylesheet" href="css/doiMatKhau.css" />
</head>
<body>
  <div class="card">
    <h2>🔒 Đổi mật khẩu</h2>

    <div class="form-group">
      <label>Mật khẩu hiện tại</label>
      <input type="password" id="matKhauCu" placeholder="Nhập mật khẩu hiện tại">
    </div>

    <div class="form-group">
      <label>Mật khẩu mới</label>
      <input type="password" id="matKhauMoi" placeholder="Ít nhất 6 ký tự">
    </div>

    <div class="form-group">
      <label>Xác nhận mật khẩu mới</label>
      <input type="password" id="xacNhanMatKhau" placeholder="Nhập lại mật khẩu mới">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="doiMatKhau()">Xác nhận</button>
      <button class="btn btn-secondary" onclick="goBack()">Quay lại</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script src="js/common/api.js"></script>
  <script src="js/common/authGuard.js"></script>
  <script src="js/auth/doiMatKhau.js"></script>
</body>
</html>
