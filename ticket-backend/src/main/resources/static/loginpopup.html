<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
  <link rel="stylesheet" href="css/font.css" />
<link rel="stylesheet" href="css/loginpopup.css" />
</head>
  <body>
    <div class="container">
      <div class="login-box">
        <h2>Đăng nhập</h2>

        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" id="username">
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password">
        </div>

        <div class="actions">
          <button class="btn-login"  onclick="login()">Đăng nhập</button>
          <button class="btn-cancel" onclick="cancelLogin()">Hủy</button>
        </div>

        <div class="exception">
          <button class="btn-register" type="button" onclick="register()">Đăng ký</button>
        </div>
      </div>
    </div>

    <!-- Model: api.js | Controller: login.js | View helpers: ui.js -->
    <script src="js/common/api.js"></script>
    <script src="js/auth/login.js"></script>
    <script src="js/common/ui.js"></script>
  </body>
</html>
